---
# Browser system dependencies for AI agent browser automation (Playwright/Puppeteer/Chromium)

- name: Install browser system dependencies
  ansible.builtin.apt:
    name:
      # Core browser libraries (required by Playwright, Puppeteer, and Chromium)
      - libnss3
      - libnspr4
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libdbus-1-3
      - libatspi2.0-0
      - libx11-6
      - libxcomposite1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxrandr2
      - libgbm1
      - libxcb1
      - libxkbcommon0
      - libpango-1.0-0
      - libcairo2
      - libasound2t64
      - libvulkan1
      - libu2f-udev
      # Headless display for browser automation
      - xvfb
      # Fonts for web page rendering
      - fonts-liberation
      - fonts-noto
      - fonts-noto-color-emoji
    state: present
    update_cache: true

- name: Install Chromium browser
  ansible.builtin.apt:
    name: chromium-browser
    state: present
  when: openclaw_browser_install_chromium | bool

- name: Check Chromium is accessible
  ansible.builtin.command: which chromium-browser
  register: chromium_path
  changed_when: false
  failed_when: false
  when: openclaw_browser_install_chromium | bool

- name: Display browser setup status
  ansible.builtin.debug:
    msg: "Browser system dependencies installed. Chromium: {{ chromium_path.stdout | default('not installed') }}"
