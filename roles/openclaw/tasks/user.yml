---
- name: Create openclaw system user
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    comment: "OpenClaw Service User"
    system: true
    shell: /bin/bash
    create_home: true
    home: "{{ openclaw_home }}"
    state: present

- name: Ensure openclaw home directory has correct ownership
  ansible.builtin.file:
    path: "{{ openclaw_home }}"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    state: directory
    mode: '0755'

- name: Configure .bashrc for openclaw user
  ansible.builtin.blockinfile:
    path: "{{ openclaw_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - OpenClaw config"
    block: |
      # Enable 256 colors
      export TERM=xterm-256color
      export COLORTERM=truecolor

      # Add pnpm to PATH
      export PNPM_HOME="{{ openclaw_home }}/.local/share/pnpm"
      export PATH="{{ openclaw_home }}/.local/bin:$PNPM_HOME:$PATH"

      # Color support for common tools
      export CLICOLOR=1
      export LS_COLORS='di=34:ln=35:so=32:pi=33:ex=31:bd=34;46:cd=34;43:su=30;41:sg=30;46:tw=30;42:ow=30;43'

      # Aliases
      alias ls='ls --color=auto'
      alias grep='grep --color=auto'
      alias ll='ls -lah'
    create: true
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0644'

- name: Add openclaw user to sudoers with autonomy permissions
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ openclaw_user }}"
    mode: '0440'
    owner: root
    group: root
    content: |
      # OpenClaw sudo permissions (broad for agent autonomy)
      #
      # SECURITY NOTE: openclaw is already in the docker group, which is
      # functionally equivalent to root access via container mounts.
      # These rules extend that to host-level operations needed for a
      # self-managing AI agent.
      #
      # To reduce to minimal permissions, comment out the package management
      # and firewall sections and restrict systemctl to specific services.

      # Package management - install/remove system packages at runtime
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/apt-get update
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/apt-get install *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/apt-get remove *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/apt-get purge *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/apt-get autoremove *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/apt-cache *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/dpkg -i *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/dpkg -r *

      # Service management - any service (create, start, stop, configure)
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl start *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl stop *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl reload *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl status *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl enable *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl disable *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl daemon-reload
      # Write systemd service/timer unit files
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tee /etc/systemd/system/*

      # Firewall management - open/close ports for services the agent creates
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/sbin/ufw allow *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/sbin/ufw deny *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/sbin/ufw delete *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/sbin/ufw status *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/sbin/ufw reload
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/sbin/ufw enable

      # Tailscale - diagnostics + connect/disconnect
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tailscale status
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tailscale up *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tailscale down
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tailscale ip *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tailscale version
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tailscale ping *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/tailscale whois *

      # Log access - all system logs
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/journalctl *

      # OpenClaw self-management - gateway restart, update, doctor
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: {{ openclaw_home }}/.local/bin/openclaw *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: {{ openclaw_home }}/.local/share/pnpm/openclaw *

      # npm - Node.js package management
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/bin/npm *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /usr/local/bin/npm *

      # File and directory permission fixes (needed for agent self-repair)
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /bin/chmod *
      {{ openclaw_user }} ALL=(ALL) NOPASSWD: /bin/chown *
    validate: /usr/sbin/visudo -cf %s

- name: Set openclaw user as primary user for installation
  ansible.builtin.set_fact:
    openclaw_user: "{{ openclaw_user }}"
    openclaw_home: "{{ openclaw_home }}"

- name: Create .bash_profile to source .bashrc for login shells
  ansible.builtin.copy:
    dest: "{{ openclaw_home }}/.bash_profile"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0644'
    content: |
      # .bash_profile - Executed for login shells
      # Source .bashrc to ensure environment is loaded for login shells
      if [ -f ~/.bashrc ]; then
          . ~/.bashrc
      fi

# Fix DBus issues for systemd user services
- name: Get openclaw user ID
  ansible.builtin.command: "id -u {{ openclaw_user }}"
  register: openclaw_uid
  changed_when: false
  when: ansible_os_family == 'Debian' and not ci_test

- name: Display openclaw user ID
  ansible.builtin.debug:
    msg: "OpenClaw user ID: {{ openclaw_uid.stdout }}"
  when: ansible_os_family == 'Debian' and not ci_test

- name: Enable lingering for openclaw user (allows systemd user services without login)
  ansible.builtin.command: "loginctl enable-linger {{ openclaw_user }}"
  changed_when: false
  when: ansible_os_family == 'Debian' and not ci_test

- name: Create runtime directory for openclaw user
  ansible.builtin.file:
    path: "/run/user/{{ openclaw_uid.stdout }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'
  when: ansible_os_family == 'Debian' and not ci_test

- name: Store openclaw UID as fact for later use
  ansible.builtin.set_fact:
    openclaw_uid_value: "{{ openclaw_uid.stdout }}"
  when: ansible_os_family == 'Debian' and not ci_test

# SSH key configuration
- name: Create .ssh directory for openclaw user
  ansible.builtin.file:
    path: "{{ openclaw_home }}/.ssh"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0700'

- name: Add SSH authorized keys for openclaw user
  ansible.posix.authorized_key:
    user: "{{ openclaw_user }}"
    state: present
    key: "{{ item }}"
  loop: "{{ openclaw_ssh_keys }}"
  when: openclaw_ssh_keys | length > 0

- name: Display SSH key configuration status
  ansible.builtin.debug:
    msg: "{{ openclaw_ssh_keys | length }} SSH key(s) configured for openclaw user"
  when: openclaw_ssh_keys | length > 0

- name: Display SSH key warning if none configured
  ansible.builtin.debug:
    msg: "No SSH keys configured. Set 'openclaw_ssh_keys' variable to allow SSH access."
  when: openclaw_ssh_keys | length == 0

- name: Set XDG_RUNTIME_DIR in .bashrc for openclaw user
  ansible.builtin.lineinfile:
    path: "{{ openclaw_home }}/.bashrc"
    line: 'export XDG_RUNTIME_DIR=/run/user/$(id -u)'
    state: present
    create: true
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0644'
  when: ansible_os_family == 'Debian' and not ci_test

- name: Set DBUS_SESSION_BUS_ADDRESS in .bashrc for openclaw user
  ansible.builtin.blockinfile:
    path: "{{ openclaw_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - DBus config"
    block: |
      # DBus session bus configuration
      if [ -z "$DBUS_SESSION_BUS_ADDRESS" ]; then
        export DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus"
      fi
    create: true
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: '0644'
  when: ansible_os_family == 'Debian' and not ci_test
