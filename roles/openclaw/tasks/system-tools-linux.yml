---
# Linux-specific system tools installation (apt-based)

- name: Install essential system tools (Linux - apt)
  ansible.builtin.apt:
    name:
      # Editors
      - vim
      - nano
      # Version control
      - git
      - git-lfs
      # Network tools
      - curl
      - wget
      - netcat-openbsd
      - net-tools
      - dnsutils
      - iputils-ping
      - traceroute
      - tcpdump
      - nmap
      - socat
      - telnet
      # Debugging tools
      - strace
      - lsof
      - gdb
      - htop
      - iotop
      - iftop
      - sysstat
      - procps
      # System utilities
      - tmux
      - tree
      - jq
      - unzip
      - zip
      - rsync
      - less
      - bc
      - ncdu
      - psmisc
      - moreutils
      - parallel
      # Build essentials for development
      - build-essential
      - file
      - pkg-config
      # Python scripting and automation
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      # Media processing (for agents working with images/video/audio/docs)
      - ffmpeg
      - imagemagick
      - ghostscript
      - pandoc
      # Modern search and file tools
      - ripgrep
      - fd-find
      # Data storage
      - sqlite3
    state: present
    update_cache: true

- name: Deploy global vim configuration (Linux)
  ansible.builtin.template:
    src: vimrc.j2
    dest: /etc/vim/vimrc.local
    owner: root
    group: root
    mode: '0644'
