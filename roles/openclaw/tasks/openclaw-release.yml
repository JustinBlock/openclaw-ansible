---
# Release mode installation - Install via npm from npm registry
#
# NOTE: We intentionally use npm (not pnpm) for global installation.
# pnpm's content-addressable store paths (.pnpm/openclaw@VERSION_.../node_modules/openclaw/)
# cause "unsafe plugin manifest path" validation failures in OpenClaw v2026.3.1+.
# npm global install uses a clean canonical path (/usr/lib/node_modules/openclaw/)
# that passes OpenClaw's path validation and works correctly under systemd.

- name: Install OpenClaw globally via npm (system-wide, run as root)
  ansible.builtin.shell:
    cmd: |
      CURRENT=$(npm list -g openclaw --depth=0 --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('dependencies',{}).get('openclaw',{}).get('version',''))" 2>/dev/null || echo "")
      LATEST=$(npm show openclaw version 2>/dev/null || echo "")
      if [ -z "$CURRENT" ] || [ "$CURRENT" != "$LATEST" ]; then
        npm install -g openclaw@latest
        echo "changed"
      else
        echo "already up to date ($CURRENT)"
      fi
    executable: /bin/bash
  environment:
    PATH: /usr/local/bin:/usr/bin:/bin
  register: openclaw_install
  changed_when: "'changed' in openclaw_install.stdout"

- name: Verify openclaw installation
  ansible.builtin.command:
    cmd: /usr/bin/openclaw --version
  register: openclaw_version
  changed_when: false

- name: Display installed OpenClaw version (release)
  ansible.builtin.debug:
    msg: "OpenClaw installed from npm: {{ openclaw_version.stdout }}"
